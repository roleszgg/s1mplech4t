<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Chat</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ===================== AUTH SCREEN ===================== -->
  <section id="auth-screen" class="screen">
    <div class="auth-card">
      <h1>💬 Simple Chat</h1>

      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Log in</button>
        <button class="tab-btn" data-tab="register">Sign up</button>
      </div>

      <form id="login-form" class="auth-form">
        <input type="text" id="login-username" placeholder="Username" autocomplete="username" required />
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required />
        <button type="submit">Log in</button>
        <p class="error" id="login-error"></p>
      </form>

      <form id="register-form" class="auth-form hidden">
        <input type="text" id="register-username" placeholder="Choose a username" autocomplete="username" required />
        <input type="password" id="register-password" placeholder="Choose a password (6+ chars)" autocomplete="new-password" required />
        <button type="submit">Create account</button>
        <p class="error" id="register-error"></p>
      </form>
    </div>
  </section>

  <!-- ===================== CHAT SCREEN ===================== -->
  <section id="chat-screen" class="screen hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span id="current-username"></span>
        <button id="logout-btn" title="Log out">⏻</button>
      </div>
      <ul id="user-list" class="user-list"></ul>
    </aside>

    <main class="conversation">
      <div class="conversation-header" id="conversation-header">Select someone to chat with</div>
      <div class="messages" id="messages"></div>
      <form id="message-form" class="message-form hidden">
        <input type="text" id="message-input" placeholder="Type a message…" autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </main>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
